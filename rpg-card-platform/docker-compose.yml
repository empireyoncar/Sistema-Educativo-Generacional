services:
  db:
    image: postgres:16
    restart: unless-stopped
    command: ["postgres", "-p", "6800"]
    environment:
      POSTGRES_USER: rpg_user
      POSTGRES_PASSWORD: rpg_password
      POSTGRES_DB: rpg_cards
    ports:
      - "6800:6800"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://rpg_user:rpg_password@db:6800/rpg_cards
      JWT_SECRET: change-this-secret-in-production
      CARD_BUILDER_COMBINATIONS_FILE: /card-builder-data/combinations.json
      CARD_BUILDER_PUBLIC_BASE: /empireyoncarsistemaeducativo/constructor-rpg/
      RPG_CARD_ASSET_ROOT: /home/empire/Imágenes/Constructor de tarjetas RPG
      ASSIGNED_CARDS_DIR: /cartas-asignadas
    volumes:
      - ./card-builder-data:/card-builder-data:ro
      - ./cartas-asignadas:/cartas-asignadas
      - "/home/empire/Imágenes/Constructor de tarjetas RPG:/home/empire/Imágenes/Constructor de tarjetas RPG:ro"
    ports:
      - "6801:6801"
    depends_on:
      - db

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: /empireyoncarsistemaeducativo/api
      VITE_CARD_BUILDER_URL: /empireyoncarsistemaeducativo/constructor-rpg/
    ports:
      - "3005:3005"
    depends_on:
      - backend
      - card-builder

  card-builder:
    build: ../gamer-card-project
    restart: unless-stopped
    environment:
      VITE_BASE_PATH: /empireyoncarsistemaeducativo/constructor-rpg/
      RPG_CARD_ASSET_ROOT: /home/empire/Imágenes/Constructor de tarjetas RPG
      ADMIN_TOKEN: empire-admin
    volumes:
      - ./card-builder-data:/app/server/data
      - "/home/empire/Imágenes/Constructor de tarjetas RPG:/home/empire/Imágenes/Constructor de tarjetas RPG:ro"
    expose:
      - "3006"

volumes:
  postgres_data:
